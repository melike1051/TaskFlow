nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: taskflow.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  apiBaseUrl: http://{{ include "taskflow.fullname" . }}-api:8080
  jwtIssuer: TaskFlow.API
  jwtAudience: TaskFlow.API

secret:
  jwtKey: CHANGE_ME

persistence:
  enabled: true
  size: 1Gi
  storageClass: ""

api:
  replicaCount: 1
  image:
    repository: ghcr.io/owner/taskflow-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

mvc:
  replicaCount: 2
  image:
    repository: ghcr.io/owner/taskflow-mvc
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8081
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
