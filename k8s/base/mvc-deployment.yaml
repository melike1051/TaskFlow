apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-mvc
  namespace: taskflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: taskflow-mvc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: taskflow-mvc
    spec:
      containers:
        - name: mvc
          image: ghcr.io/owner/taskflow-mvc:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: http://+:8081
            - name: ApiBaseUrl
              valueFrom:
                configMapKeyRef:
                  name: taskflow-config
                  key: api-base-url
            - name: UseHttpsRedirection
              value: "false"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
