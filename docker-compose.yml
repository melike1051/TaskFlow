version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Docker/Dockerfile.API
    image: taskflow-api:local
    container_name: taskflow-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/data/taskflow.db
      Jwt__Key: CHANGE_ME_IN_PRODUCTION
      Jwt__Issuer: TaskFlow.API
      Jwt__Audience: TaskFlow.API
      UseHttpsRedirection: "false"
    volumes:
      - taskflow-data:/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  mvc:
    build:
      context: .
      dockerfile: Docker/Dockerfile.MVC
    image: taskflow-mvc:local
    container_name: taskflow-mvc
    depends_on:
      api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8081
      ApiBaseUrl: http://api:8080
      UseHttpsRedirection: "false"
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8081/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  taskflow-data:
